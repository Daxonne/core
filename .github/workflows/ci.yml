name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: lint, build, unit tests ──────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Unit tests
        run: go test -race -count=1 -timeout=60s ./...

  # ── Job 2: integration tests against Oracle Free ─────────────────────────────
  integration:
    name: Integration Tests (Oracle)
    runs-on: ubuntu-latest
    needs: build  # only run when the build job succeeds

    services:
      oracle:
        image: gvenzl/oracle-free:latest
        env:
          ORACLE_PASSWORD: cipassword
          APP_USER: autosendmail
          APP_USER_PASSWORD: autosendmail
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 20s
          --health-timeout 10s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        env:
          DAXONNE_TEST_DSN: oracle://autosendmail:autosendmail@localhost:1521/FREEPDB1
          DAXONNE_TEST_OWNER: AUTOSENDMAIL
        run: go test -tags integration -race -count=1 -timeout=300s -v ./...
